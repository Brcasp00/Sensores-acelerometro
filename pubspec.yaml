name: squat_counter
description: "Aplicativo Flutter que utiliza acelerômetro para contar agachamentos."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Sensores do dispositivo
  sensors_plus: ^6.1.1

  # Persistência
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Feedback ao usuário
  vibration: ^3.1.3
  audioplayers: ^6.1.0

  # Gráficos e formatação
  fl_chart: ^0.70.0
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
